name: 內容提案 New content / 在地案例
description: 提議新文章主題，或補充台灣在地案例與觀點
title: "[內容] "
labels: ["documentation", "enhancement"]
body:
  - type: markdown
    attributes:
      value: |
        想新增一篇文章，或替既有文章補上台灣在地案例都從這裡開始。工具操作與安全情境類內容（tools、scenarios、advanced）會由維護者做技術審核才合併，動手前可先看[如何參與與認領主題](https://anoni.net/docs/zh-TW/community/how-to-contribute/)。
  - type: dropdown
    id: kind
    attributes:
      label: 提案類型
      options:
        - 新主題文章
        - 既有文章的在地案例或台灣觀點補充
        - 其他
    validations:
      required: true
  - type: dropdown
    id: category
    attributes:
      label: 預計分類
      description: 不確定可先選「不確定」，我們一起決定放哪。
      options:
        - basics 概念
        - tools 工具
        - scenarios 場景
        - advanced 進階
        - taiwan 在地
        - reports 報告中譯
        - 不確定
    validations:
      required: false
  - type: textarea
    id: summary
    attributes:
      label: 主題重點
      description: 想寫什麼、為什麼重要、對哪些讀者有用。
    validations:
      required: true
  - type: textarea
    id: sources
    attributes:
      label: 參考來源
      description: 手上的資料、連結、案例出處。
    validations:
      required: false
  - type: checkboxes
    id: ack
    attributes:
      label: 開始前的確認
      options:
        - label: 若內容屬 tools、scenarios、advanced 安全核心，我了解需要維護者技術審核才會合併。
          required: false
