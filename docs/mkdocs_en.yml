theme:
  name: material
  logo: assets/images/logo-white.svg
  icon:
    repo: fontawesome/brands/github
  favicon: assets/images/favicon.svg
  palette:
    - media: "(prefers-color-scheme)"
      toggle:
        icon: material/brightness-auto
        name: Switch to light mode
    - media: "(prefers-color-scheme: light)"
      scheme: default
      primary: light blue
      accent: light blue
      toggle:
        icon: material/lightbulb
        name: Switch to dark mode
    - media: "(prefers-color-scheme: dark)"
      scheme: slate
      primary: cyan
      accent: light blue
      toggle:
        icon: material/lightbulb-outline
        name: Switch to light mode
  language: !ENV [LANGUAGE, "zh-TW"]
  custom_dir: !ENV [OVERRIDES, "overrides"]
  features:
    - navigation.top
    - navigation.sections
    - navigation.tabs
    - navigation.tabs.sticky
    - navigation.indexes
    - navigation.path
    - search.suggest
    - search.highlight
    - search.share
    - content.action.view
    - content.action.edit
    - content.tooltips
    - content.code.copy
    - content.footnote.tooltips
extra:
  alternate:
    - name: English (en-US)
      link: /docs/en/
      lang: en
    - name: 臺灣正體（zh-TW）
      link: /docs/zh-tw/
      lang: zh-TW
    - name: 簡體中文（zh-CN）
      link: /docs/zh-cn/
      lang: zh-CN
  social:
    - icon: material/home
      link: https://anoni.net/docs/en/
    - icon: fontawesome/brands/github
      link: https://github.com/anoni-net/docs
    - icon: simple/torbrowser
      link: http://docs.anoninetru5tflukgfaehun7q6khowgmymcff3gtk5oyesqazhmfxtyd.onion/en/
    - icon: material/email-plus
      link: https://form.anoni.net/s/w21855zpca072rvgp0s2govj
