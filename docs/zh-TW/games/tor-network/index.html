<!DOCTYPE html>
<html lang="zh-Hant">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <meta name="robots" content="noindex" />
  <title>Tor 網路現況 · anoni.net</title>
  <style>
    :root {
      --cyan: #00aeff; --ink: #eaf6ff; --muted: #9fb6c8;
      --panel: rgba(9, 16, 26, .78); --panel-b: rgba(0, 174, 255, .26);
    }
    * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
    html, body { margin: 0; height: 100%; overflow: hidden; background: #04060d; }
    body { font: 14px/1.6 -apple-system, "Noto Sans TC", "PingFang TC", system-ui, sans-serif; color: var(--ink); }
    canvas { display: block; position: fixed; inset: 0; touch-action: none; }

    .panel {
      position: fixed; z-index: 10; background: var(--panel);
      border: 1px solid var(--panel-b); border-radius: 14px;
      backdrop-filter: blur(9px); -webkit-backdrop-filter: blur(9px);
      box-shadow: 0 10px 40px rgba(0, 0, 0, .45);
    }
    #top { left: 14px; top: 14px; max-width: min(94vw, 340px); max-height: calc(100vh - 28px); overflow-y: auto; padding: 12px 15px; }
    #title { margin: 0; font-size: 16px; font-weight: 800; letter-spacing: .3px; cursor: pointer; list-style: none; display: flex; align-items: center; justify-content: space-between; gap: 10px; }
    #title::-webkit-details-marker { display: none; }
    #title::after { content: '▾ 收合'; flex: none; color: var(--cyan); font-size: 11px; font-weight: 800; padding: 3px 9px; line-height: 1; border: 1px solid var(--panel-b); border-radius: 999px; background: rgba(0, 174, 255, .12); }
    #info:not([open]) > #title::after { content: '▸ 詳情'; }
    .body { margin-top: 9px; }
    #big { font-size: 27px; font-weight: 800; color: #fff; line-height: 1.1; }
    #big small { font-size: 12.5px; font-weight: 600; color: var(--muted); }
    #pub { color: var(--muted); font-size: 11px; margin: 3px 0 10px; }
    .row { display: flex; flex-wrap: wrap; gap: 5px; margin-bottom: 9px; }
    .chip { font-size: 11.5px; padding: 2px 8px; border-radius: 999px; background: rgba(255,255,255,.06); color: var(--ink); display: inline-flex; align-items: center; gap: 5px; }
    .chip[style*="--c"]::before { content: ''; width: 8px; height: 8px; border-radius: 50%; background: var(--c); box-shadow: 0 0 7px var(--c); }
    .lbl { font-size: 10.5px; font-weight: 800; color: var(--muted); letter-spacing: .5px; margin: 2px 0 4px; }
    #note { color: var(--muted); font-size: 11.5px; line-height: 1.6; }
    #backend { display: inline-block; margin-top: 10px; font-size: 11px; font-weight: 700; padding: 2px 8px; border-radius: 999px; background: rgba(255,255,255,.06); color: var(--muted); }
    #backend.gpu { color: #57e39a; } #backend.gl { color: #ffcf5c; } #backend.err { color: #ff5a5a; }

    #hint { left: 50%; bottom: 18px; transform: translateX(-50%); z-index: 9; max-width: min(92vw, 460px); padding: 8px 14px; font-size: 12px; color: var(--muted); display: flex; gap: 10px; align-items: center; }
    #hint.hidden { display: none; }
    #hint-close { cursor: pointer; color: var(--cyan); font-weight: 800; }
    @media (max-width: 680px) { #hint { font-size: 10.5px; bottom: 12px; } #big { font-size: 24px; } }
  </style>
  <script type="importmap">
  { "imports": {
      "three": "../vendor/three.webgpu.min.js",
      "three/webgpu": "../vendor/three.webgpu.min.js",
      "three/tsl": "../vendor/three.tsl.min.js",
      "three/addons/": "../vendor/jsm/"
  } }
  </script>
</head>
<body>
  <div id="top" class="panel">
    <details id="info" open>
      <summary id="title">Tor 網路現況</summary>
      <div class="body">
        <div id="big"><span id="stat-total">–</span> <small>台運作中的中繼</small></div>
        <div id="pub">資料快照：<span id="stat-pub">…</span></div>
        <div class="lbl">角色分布</div>
        <div class="row" id="stat-role"></div>
        <div class="lbl">中繼最多的國家</div>
        <div class="row" id="stat-country"></div>
        <div id="note">每個亮點是一台真實中繼，依所在國家聚在地球上；顏色分角色、大小分頻寬。真實 Tor 約有近萬台中繼分布全球，明顯集中在少數幾個國家與網段。</div>
        <div id="backend">偵測中…</div>
      </div>
    </details>
  </div>
  <script>if (window.matchMedia('(max-width:680px)').matches) document.getElementById('info').open = false;</script>

  <div id="hint" class="panel">
    <span>拖曳旋轉地球 · 滾輪或雙指縮放 · 放開後自動轉</span>
    <span id="hint-close">知道了</span>
  </div>

  <script type="module" src="./atlas.js"></script>
</body>
</html>
