theme:
  name: material
  logo: assets/images/logo-white.svg
  icon:
    repo: fontawesome/brands/github
  favicon: assets/images/favicon.svg
  palette:
    - media: "(prefers-color-scheme)"
      toggle:
        icon: material/brightness-auto
        name: Switch to light mode
    - media: "(prefers-color-scheme: light)"
      scheme: default
      primary: light blue
      accent: light blue
      toggle:
        icon: material/lightbulb
        name: Switch to dark mode
    - media: "(prefers-color-scheme: dark)"
      scheme: slate
      primary: cyan
      accent: light blue
      toggle:
        icon: material/lightbulb-outline
        name: Switch to light mode
  language: !ENV [LANGUAGE, "zh"]
  custom_dir: !ENV [OVERRIDES, "overrides_cn"]
  features:
    - navigation.top
    - navigation.sections
    - navigation.tabs
    - navigation.tabs.sticky
    - navigation.indexes
    - navigation.path
    - search.suggest
    - search.highlight
    - search.share
    - content.action.view
    - content.action.edit
    - content.tooltips
    - content.code.copy
    - content.footnote.tooltips
extra:
  alternate:
    - name: 臺灣正體（zh-TW）
      link: /docs/zh-tw/
      lang: zh-TW
    - name: 简体中文（zh-CN）
      link: /docs/zh-cn/
      lang: zh-CN
    - name: English (en-US)
      link: /docs/en/
      lang: en
  social:
    - icon: material/home
      link: https://anoni.net/docs/
    - icon: fontawesome/brands/github
      link: https://github.com/anoni-net/docs
    - icon: simple/torbrowser
      link: http://docs.anoninetru5tflukgfaehun7q6khowgmymcff3gtk5oyesqazhmfxtyd.onion/
    - icon: material/email-plus
      link: https://form.anoni.net/s/cmc9ceju1000dlj017fiathzq
extra_css:
  - stylesheets/extra.css
extra_javascript:
  - https://cdn.jsdelivr.net/npm/vega@5
  - https://cdn.jsdelivr.net/npm/vega-lite@5
  - https://cdn.jsdelivr.net/npm/vega-embed@6/build/vega-embed.min.js
plugins:
  - search:
      lang:
        - zh
        - en
  - social:
      cards_layout_options:
        font_family: Noto Sans SC
        color: "#ffffff"
        background_color: "#00aeff"
  - privacy:
      assets_exclude:
        - aa.anoni.net/*
        - static.cloudflareinsights.com/*
  - git-revision-date-localized:
      type: iso_datetime
      locale: en
      enable_creation_date: true
      enable_parallel_processing: true
  - blog:
      post_url_date_format: yyyy/MM
      post_url_format: "{date}/{slug}"
      archive: true
      categories: true
      categories_name: !ENV [CATE_NAME, "文章类型"]
  - rss:
      match_path: blog/posts/.*
      date_from_meta:
        as_creation: date
        as_update: git
      categories:
        - categories
        - tages
      pretty_print: false
      abstract_chars_count: -1
  - charts:
      vega_theme_light: powerbi
      vega_theme_dark: carbong100
      integrations:
        mkdocs_material:
          themes_light:
            - default
          themes_dark:
            - slate
markdown_extensions:
  - abbr
  - attr_list
  - md_in_html
  - admonition
  - pymdownx.blocks.caption
  - pymdownx.details
  - pymdownx.superfences:
      custom_fences:
        - name: vegalite
          class: vegalite
          format: !!python/name:mkdocs_charts_plugin.fences.fence_vegalite
  - pymdownx.snippets
  - pymdownx.tabbed:
      alternate_style: true
  - pymdownx.tasklist:
      custom_checkbox: true
  - pymdownx.emoji:
      emoji_index: !!python/name:material.extensions.emoji.twemoji
      emoji_generator: !!python/name:material.extensions.emoji.to_svg
  - toc:
      permalink: true
      slugify: !!python/object/apply:pymdownx.slugs.slugify {}
  - footnotes
